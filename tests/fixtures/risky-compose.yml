services:
  dockwatch:
    image: example/dockwatch:latest
    privileged: true
    restart: "no"
    network_mode: host
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc:/host/etc:ro
    environment:
      API_TOKEN: super-secret
      NVIDIA_VISIBLE_DEVICES: all
    devices:
      - /dev/dri:/dev/dri
